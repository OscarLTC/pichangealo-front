<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pichangealo - Gestión de Canchas</title>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            pichangealo: {
              DEFAULT: '#16A34A',
              dark: '#15803d',
              light: '#f0fdf4',
            },
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          borderRadius: {
            '3xl': '24px',
            '2xl': '18px',
            'xl': '14px',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-scroll-and-effects">
    body {
      background-color: #f8fafc;
      font-family: 'Inter', sans-serif;
    }
    /* Smooth transition for modal backdrop */
    .modal-backdrop {
      background-color: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
    }
    /* Subtle shadow for the modal to match the "elevated" requirement */
    .modal-shadow {
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
    }
    /* Custom radio appearance for the status chips */
    .status-chip input:checked + span {
      background-color: #16A34A;
      color: white;
      border-color: #16A34A;
    }
  </style>
</head>
<body class="min-h-screen">
<!-- BEGIN: Main Dashboard Layout (Static Background) -->
<header class="bg-white border-b border-gray-100 px-8 py-4 flex items-center justify-between sticky top-0 z-10">
<div class="flex items-center gap-8">
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-pichangealo rounded-lg flex items-center justify-center">
<svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<span class="font-bold text-xl tracking-tight text-slate-800">Pichangealo</span>
</div>
<nav class="hidden md:flex items-center gap-6 text-sm font-medium text-slate-500">
<a class="hover:text-pichangealo transition-colors" href="#">Dashboard</a>
<a class="text-pichangealo" href="#">Reservas</a>
<a class="hover:text-pichangealo transition-colors" href="#">Caja</a>
<a class="hover:text-pichangealo transition-colors" href="#">Configuración</a>
</nav>
</div>
<div class="flex items-center gap-4">
<button class="p-2 bg-slate-100 rounded-full text-slate-600">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
<div class="w-10 h-10 rounded-full bg-orange-100 flex items-center justify-center overflow-hidden border border-orange-200">
<img alt="Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAdKfLHiTXdX9pemZr-CY1SgHYRKpHn2QVUEpgjNO7UU7hFYiV4pUUDVpKxT36EC6v6TE_KH5eGP1dByOLHNbjhPR9ET9Civs6SmIzkovkPVlpAnz6r6dAcExOW03H20MRevd_iDcih07s4z3Cy3teKTdhyYEeb8frd_98WHuz-HH8R3-HDXmSJevj6Nw75TEhGGHnImrngPQ1ihtdRafJdHx_qQBjxZgaucSJp9liCdVZkHJ8RUJyHQW_9rwkc5ge0pPJbKzqk-JM"/>
</div>
</div>
</header>
<main class="p-8 max-w-7xl mx-auto">
<!-- Grid context from Screen 22 -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 opacity-40 select-none pointer-events-none">
<div class="border-2 border-dashed border-slate-300 rounded-3xl h-80 flex flex-col items-center justify-center gap-4 bg-white/50">
<div class="w-16 h-16 rounded-full bg-pichangealo/10 flex items-center justify-center text-pichangealo">
<svg class="w-8 h-8" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<p class="font-bold text-slate-700">Nueva Cancha</p>
</div>
<div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100 h-80">
<div class="h-40 bg-slate-200"></div>
<div class="p-5">
<div class="h-4 w-3/4 bg-slate-100 rounded mb-4"></div>
<div class="h-4 w-1/2 bg-slate-100 rounded"></div>
</div>
</div>
</div>
</main>
<!-- END: Main Dashboard Layout -->
<!-- BEGIN: Modal Container -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop" data-purpose="modal-overlay" id="modal-overlay">
<!-- Modal Content -->
<div class="bg-white w-full max-w-lg rounded-3xl modal-shadow relative overflow-hidden flex flex-col" data-purpose="creation-modal">
<!-- Modal Header -->
<div class="px-8 pt-8 pb-4 flex justify-between items-start">
<div>
<h2 class="text-2xl font-bold text-slate-800 tracking-tight">Registrar Nueva Cancha</h2>
<p class="text-slate-500 text-sm mt-1">Completa los detalles para tu nuevo espacio deportivo.</p>
</div>
<button class="p-2 hover:bg-slate-100 rounded-full transition-colors text-slate-400 hover:text-slate-600" id="close-modal">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
</div>
<!-- Modal Body (Form) -->
<form class="px-8 py-4 space-y-6" id="field-form">
<!-- Field Name -->
<div class="space-y-2">
<label class="text-xs font-semibold text-slate-500 uppercase tracking-wider ml-1" for="cancha-nombre">Nombre de la cancha</label>
<input class="w-full border-slate-200 rounded-xl px-4 py-3.5 focus:ring-pichangealo focus:border-pichangealo placeholder:text-slate-400 text-slate-700 transition-all" id="cancha-nombre" placeholder="Ej. Cancha Central F5" type="text"/>
</div>
<!-- Row: Type and Category -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="text-xs font-semibold text-slate-500 uppercase tracking-wider ml-1" for="cancha-tipo">Tipo de cancha</label>
<select class="w-full border-slate-200 rounded-xl px-4 py-3.5 focus:ring-pichangealo focus:border-pichangealo text-slate-700 appearance-none bg-white" id="cancha-tipo">
<option value="f5">Fútbol 5</option>
<option value="f6">Fútbol 6</option>
<option value="f7">Fútbol 7</option>
<option value="f11">Fútbol 11</option>
</select>
</div>
<div class="space-y-2">
<label class="text-xs font-semibold text-slate-500 uppercase tracking-wider ml-1" for="cancha-categoria">Categoría</label>
<input class="w-full border-slate-200 rounded-xl px-4 py-3.5 focus:ring-pichangealo focus:border-pichangealo placeholder:text-slate-400 text-slate-700" id="cancha-categoria" placeholder="Ej. Techada" type="text"/>
</div>
</div>
<!-- Row: Price -->
<div class="space-y-2">
<label class="text-xs font-semibold text-slate-500 uppercase tracking-wider ml-1" for="cancha-precio">Precio base por hora</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium">S/</span>
<input class="w-full border-slate-200 rounded-xl pl-10 pr-4 py-3.5 focus:ring-pichangealo focus:border-pichangealo placeholder:text-slate-400 text-slate-700 font-medium" id="cancha-precio" placeholder="0.00" type="number"/>
</div>
</div>
<!-- Status Selection (Chips) -->
<div class="space-y-3">
<span class="text-xs font-semibold text-slate-500 uppercase tracking-wider ml-1">Estado inicial</span>
<div class="flex gap-3">
<label class="status-chip cursor-pointer">
<input checked="" class="hidden" name="status" type="radio" value="active"/>
<span class="px-5 py-2.5 rounded-full border border-slate-200 text-slate-600 text-sm font-medium flex items-center gap-2 hover:bg-slate-50 transition-all">
<span class="w-2 h-2 rounded-full bg-current"></span> Activa
              </span>
</label>
<label class="status-chip cursor-pointer">
<input class="hidden" name="status" type="radio" value="inactive"/>
<span class="px-5 py-2.5 rounded-full border border-slate-200 text-slate-600 text-sm font-medium flex items-center gap-2 hover:bg-slate-50 transition-all">
<span class="w-2 h-2 rounded-full bg-current opacity-40"></span> Inactiva
              </span>
</label>
<label class="status-chip cursor-pointer">
<input class="hidden" name="status" type="radio" value="maintenance"/>
<span class="px-5 py-2.5 rounded-full border border-slate-200 text-slate-600 text-sm font-medium flex items-center gap-2 hover:bg-slate-50 transition-all">
<span class="w-2 h-2 rounded-full bg-orange-400"></span> Mantenimiento
              </span>
</label>
</div>
</div>
</form>
<!-- Modal Footer -->
<div class="px-8 py-8 flex flex-col-reverse sm:flex-row items-center justify-end gap-3 bg-slate-50/50 mt-4 border-t border-slate-50">
<button class="w-full sm:w-auto px-8 py-3.5 text-slate-500 font-semibold hover:text-slate-700 transition-colors" id="cancel-btn" type="button">
          Cancelar
        </button>
<button class="w-full sm:w-auto bg-pichangealo hover:bg-pichangealo-dark text-white px-10 py-3.5 rounded-xl font-bold shadow-lg shadow-pichangealo/20 transition-all transform active:scale-95" form="field-form" type="submit">
          Guardar Cancha
        </button>
</div>
</div>
</div>
<!-- END: Modal Container -->
<script data-purpose="modal-interactivity">
    // Minimal logic to demonstrate closing the modal
    const modal = document.getElementById('modal-overlay');
    const closeBtn = document.getElementById('close-modal');
    const cancelBtn = document.getElementById('cancel-btn');

    const closeModal = () => {
      modal.classList.add('opacity-0', 'pointer-events-none');
      modal.style.transition = 'opacity 0.2s ease-out';
      setTimeout(() => {
        // In a real app, you'd likely remove it from DOM or manage state
        console.log('Modal hidden');
      }, 200);
    };

    closeBtn.addEventListener('click', closeModal);
    cancelBtn.addEventListener('click', closeModal);

    // Close on backdrop click
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });
  </script>
</body></html>
